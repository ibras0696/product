services:
  postgres:
    ports: ["127.0.0.1:${POSTGRES_PORT:-5432}:5432"]

  redis:
    ports: ["127.0.0.1:${REDIS_PORT:-6379}:6379"]

  rabbitmq:
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  api:
    build:
      context: ../backend
      target: development
    volumes:
      - ../backend/src:/app/src:ro
      - ../backend/migrations:/app/migrations
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ../backend
      target: development
    volumes:
      - ../backend/src:/app/src:ro
    command: ["celery", "-A", "infrastructure.celery_app:celery", "worker", "--loglevel=INFO", "--concurrency=2"]

  frontend:
    build:
      context: ../frontend
      target: development
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["npm", "run", "dev"]

volumes:
  frontend_node_modules:
