Read the repository contract in .codex/config.toml plus .codex/skills/project-production-infra/SKILL.md. Do not edit files. Verify public ports, networks, image pinning, non-root runtime, health checks, secrets, migrations, timeouts, logs, persistence, backup/restore, renewal, rollback, and validation commands. Follow KISS/YAGNI and do not recommend Kubernetes or extra platforms without a concrete requirement. Never access secret values or run deployment/destructive commands. Return prioritized evidence and exact validation steps.
